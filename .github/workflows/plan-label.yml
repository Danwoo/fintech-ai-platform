# plan-label — PR 이 계획 국면을 종료하면 `human: plan` 을 자동 회수한다 (레버 2)
#
# 구조 (2026-07-24, CI 체크 정리): 이슈 코멘트 전용 잡(add-waiting-label·remove-on-approval)은
# plan-label-issue.yml 로 분리했다 — 그것들이 pull_request 트리거 때문에 모든 PR 에 상시 SKIPPED
# 두 줄로 뜨던 노이즈를 근본 제거하기 위함. 이 파일은 PR 이 트리거하는 레버 2 만 담는다.
#
# 레버 2: PR 이 Closes/Fixes/Resolves 로 이슈를 참조하며 열리면, 그 이슈의 `human: plan` 을 자동
#   회수한다. PR 의 존재 = 구현이 시작됐다 = 계획 국면 종료. 세션 승인(out-of-band)·저위험 자동
#   진행 모두 이 실물 트리거로 GitHub 이 스스로 화해한다. 진짜 사람 게이트는 머지(review-gate).
#
# 배포: 이 파일 + plan-label-issue.yml 을 대상 레포의 .github/workflows/ 에 복사한다.
# 전제: 레포에 `human: plan` 라벨이 정의되어 있어야 한다.

name: plan-label

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  issues: write
  pull-requests: read

jobs:
  reconcile-on-pr:
    name: "chore: plan-reconcile"
    # PR 이 Closes 로 이슈를 참조하며 열리면 그 이슈들의 human: plan 을 자동 회수한다.
    if: ${{ github.event_name == 'pull_request' && !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - name: Reconcile plan-waiting on linked issues
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -uo pipefail
          NAME="${REPO#*/}"
          # PR 이 닫는 이슈들 (closing 키워드 — Refs 는 안 잡힘, worker 규약이 Closes 필수)
          issues=$(gh api graphql -f query='
            query($o:String!,$n:String!,$pr:Int!){ repository(owner:$o,name:$n){
              pullRequest(number:$pr){ closingIssuesReferences(first:20){ nodes{ number } } } } }' \
            -f o="$OWNER" -f n="$NAME" -F pr="$PR" \
            --jq '.data.repository.pullRequest.closingIssuesReferences.nodes[].number' 2>/dev/null || true)
          [ -z "$issues" ] && { echo "닫는 이슈 없음 (Closes 미참조) — 무행동"; exit 0; }
          for N in $issues; do
            has=$(gh issue view "$N" --repo "$REPO" --json labels \
              --jq '[.labels[].name] | index("human: plan")' 2>/dev/null || echo null)
            if [ "$has" != "null" ] && [ -n "$has" ]; then
              gh issue edit "$N" --repo "$REPO" --remove-label "human: plan" \
                && echo "이슈 #$N: PR #$PR 열림 → human: plan 자동 회수 (계획 국면 종료)"
            else
              echo "이슈 #$N: human: plan 없음 — 무행동"
            fi
          done
