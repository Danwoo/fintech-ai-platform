# plan-label — 계획 대기열을 GitHub 라벨로 강제한다 (하네스 진단 갭 9 의 구조적 처방)
#
# 소프트 정책(스킬 텍스트의 "라벨을 붙여라")은 지휘자가 계획자 역할을 인라인으로
# 흡수하는 순간 증발한다 — fintech 에서 실측된 갭. gate 훅과 같은 원리로,
# 규약을 기억이 아니라 구조에 박는다: 계획 코멘트 자체가 라벨을 트리거한다.
#
# 규약 (planner 스킬 산출물과 정합):
#   `## 계획` 코멘트 + `계획 승인: 필요` 선언  → `human: plan` 라벨 자동 부착 (레버 1)
#   `## 계획` 코멘트 + `계획 승인: 불요` 선언  → 라벨 미부착 + 안내 코멘트 (저위험 — 자동 진행)
#   `## 계획` 코멘트에 선언 라인이 아예 없음    → fail-safe 로 라벨 부착 (구 동작 보존)
#   소유자의 `승인` 으로 시작하는 코멘트        → 라벨 자동 제거 (승인이 GitHub 잔류물로 남는다)
#   `## 승인된 계획` (사전 승인 후 기록)        → 라벨 없음 (`## 계획` 과 접두사가 다르다)
#   **PR 이 Closes 로 이슈를 참조하며 열림**     → 그 이슈의 `human: plan` 자동 회수 (레버 2)
#     — 구현이 시작됐다는 실물(PR)이 곧 "계획 국면 종료"의 증거다. 세션에서 사람이 승인했든
#       (out-of-band 승인 — 운영 6차 갭), 저위험이라 게이트 없이 진행했든, GitHub 기록이
#       스스로 화해한다. 손으로 `승인` 코멘트를 달 필요가 없다. 진짜 사람 게이트는 머지다.
#
# 레버 1 (결정 17 — 계획 게이트는 critical 에만): planner 가 계획 본문에 자기 선언한 criticality
#   (`계획 승인: 필요|불요`)를 이 워크플로가 판독해 게이트를 켜고 끈다. `필요` = 비가역·설계 갈림
#   (critical) → 사람 계획 게이트. `불요` = 기존 틀 내 변경(저위험) → 게이트 생략, 자동 진행.
#   선언이 없으면 부착(fail-safe — 안전한 방향). 판정 주체는 planner 자기 선언이라 gate declare
#   (디스패치 게이트)와 독립이다 — 작업 탭 포함 전 경로 자기완결.
#
# 배포: 이 파일을 대상 레포의 .github/workflows/ 에 복사한다.
# 전제: 레포에 `human: plan` 라벨이 정의되어 있어야 한다.

name: plan-label

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  issues: write
  pull-requests: read

jobs:
  add-waiting-label:
    # PR 코멘트가 아닌 이슈 코멘트 + `## 계획` 으로 시작할 때만. 부착 여부는 계획의
    # 자기 선언(`계획 승인: 필요|불요`, 레버 1)이 가른다 — 아래 스텝에서 분기한다.
    if: ${{ !github.event.issue.pull_request && startsWith(github.event.comment.body, '## 계획') }}
    runs-on: ubuntu-latest
    steps:
      - name: Add plan-waiting label unless plan self-declares low-risk
        env:
          GH_TOKEN: ${{ github.token }}
          NUM: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          BODY: ${{ github.event.comment.body }}
        run: |
          set -uo pipefail
          # planner 의 자기 선언(결정 17 레버 1)을 판독한다:
          #   "계획 승인: 필요" → 고위험(비가역·설계 갈림) → human: plan 부착 (사람 계획 게이트)
          #   "계획 승인: 불요" → 저위험(기존 틀 내)       → 미부착 + 안내 코멘트 (자동 진행)
          #   선언 라인 없음     → fail-safe 부착 (구 동작 보존 — 안전한 방향)
          # 파싱은 견고하게: 마크다운 강조(**·_·`) 제거 + 콜론형(: 또는 ：) 선언 라인만 판독.
          decl=$(printf '%s' "$BODY" \
            | sed 's/[*_`]//g' \
            | grep -m1 -E '계획 승인[[:space:]]*[:：]' || true)
          if printf '%s' "$decl" | grep -q '불요'; then
            echo "계획 승인: 불요 (저위험) — human: plan 미부착, 자동 진행"
            gh issue comment "$NUM" --repo "$REPO" \
              --body "저위험 — 계획 게이트 생략, 자동 진행합니다. 통제는 머지에서 이뤄집니다 (결정 17 레버 1)."
          elif printf '%s' "$decl" | grep -q '필요'; then
            echo "계획 승인: 필요 (고위험) — human: plan 부착"
            gh issue edit "$NUM" --repo "$REPO" --add-label "human: plan"
          else
            echo "계획 승인 선언 라인 없음/불명확 — fail-safe 로 human: plan 부착 (구 동작 보존)"
            gh issue edit "$NUM" --repo "$REPO" --add-label "human: plan"
          fi

  remove-on-approval:
    # 레포 소유자의 `승인` 코멘트만 라벨을 뗀다 — 사람 게이트의 흔적이 GitHub 에 남는다
    if: ${{ github.event_name == 'issue_comment' && !github.event.issue.pull_request && github.event.comment.author_association == 'OWNER' && startsWith(github.event.comment.body, '승인') }}
    runs-on: ubuntu-latest
    steps:
      - name: Remove plan-waiting label
        env:
          GH_TOKEN: ${{ github.token }}
          NUM: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          gh issue edit "$NUM" --repo "$REPO" --remove-label "human: plan"

  reconcile-on-pr:
    # 레버 2 — PR 이 Closes/Fixes/Resolves 로 이슈를 참조하며 열리면, 그 이슈들의 human: plan 을
    # 자동 회수한다. PR 의 존재 = 구현이 시작됐다 = 계획 국면 종료. 세션 승인(out-of-band)·저위험
    # 자동 진행 모두 이 실물 트리거로 GitHub 이 스스로 화해한다. 진짜 사람 게이트는 머지(review-gate).
    if: ${{ github.event_name == 'pull_request' && !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - name: Reconcile plan-waiting on linked issues
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -uo pipefail
          NAME="${REPO#*/}"
          # PR 이 닫는 이슈들 (closing 키워드 — Refs 는 안 잡힘, worker 규약이 Closes 필수)
          issues=$(gh api graphql -f query='
            query($o:String!,$n:String!,$pr:Int!){ repository(owner:$o,name:$n){
              pullRequest(number:$pr){ closingIssuesReferences(first:20){ nodes{ number } } } } }' \
            -f o="$OWNER" -f n="$NAME" -F pr="$PR" \
            --jq '.data.repository.pullRequest.closingIssuesReferences.nodes[].number' 2>/dev/null || true)
          [ -z "$issues" ] && { echo "닫는 이슈 없음 (Closes 미참조) — 무행동"; exit 0; }
          for N in $issues; do
            has=$(gh issue view "$N" --repo "$REPO" --json labels \
              --jq '[.labels[].name] | index("human: plan")' 2>/dev/null || echo null)
            if [ "$has" != "null" ] && [ -n "$has" ]; then
              gh issue edit "$N" --repo "$REPO" --remove-label "human: plan" \
                && echo "이슈 #$N: PR #$PR 열림 → human: plan 자동 회수 (계획 국면 종료)"
            else
              echo "이슈 #$N: human: plan 없음 — 무행동"
            fi
          done
