# require-merge-label — 리뷰 없는 머지를 구조적으로 차단 (하네스: 리뷰-머지 경합 방지)
#
# PR 에 `머지 대기` 라벨(= 독립 리뷰 통과 신호)이 없으면 이 체크가 fail 한다.
# branch protection 에서 이 체크(job 'merge-label')를 required 로 걸면, 라벨 없는 PR 은 머지가 잠긴다.
# → "리뷰 후 머지" 가 소프트 귀띔이 아니라 구조가 된다 (병렬 속도에서도 리뷰가 안 빠진다).
#
# 라벨은 이벤트 페이로드가 아니라 gh 로 직접 조회한다 (페이로드 labels 추출이 불안정 — 실측).
# 배포: 대상 레포 .github/workflows/ 에 복사 + main 보호에서 job 'merge-label' required.

name: require-merge-label

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  merge-label:
    runs-on: ubuntu-latest
    steps:
      - name: 머지 대기 라벨(독립 리뷰 통과) 필수
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          LABELS=$(gh pr view "$PR" --repo "$REPO" --json labels --jq '[.labels[].name] | join("|")')
          echo "라벨: [$LABELS]"
          case "|$LABELS|" in
            *"|머지 대기|"*) echo "✓ 독립 리뷰 통과(머지 대기) — 머지 허용"; exit 0 ;;
            *) echo "::error::'머지 대기' 라벨 없음 — 독립 리뷰 통과 후 머지하라"; exit 1 ;;
          esac
