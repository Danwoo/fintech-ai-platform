# board-status — 보드 Status 를 작업 흐름의 실제 신호에 물린다 (하네스 진단 갭 10)
#
#   소유자 '승인' 코멘트 (이슈)   → 그 이슈를 In Progress 로  (승인 = 디스패치 직전)
#   PR 열림 / draft 해제          → PR 이 Closes 로 참조하는 이슈들을 In Review 로
#   사람-차례 라벨 부착           → 그 이슈/PR 을 "사람 대기" 로  (정책 결정 대기 ·
#                                    계획 승인 대기 · 머지 대기 — 사람 진입점 단일화)
#   사람-차례 라벨 해제 (열린 것) → 이슈는 In Progress, PR 은 In Review 로 복귀
#   닫힘·머지 → Done              → 내장 자동화가 담당 (이 파일 범위 밖)
#
# 전제: PROJECT_TOKEN 시크릿 (classic PAT, **repo + project 두 스코프**). 기본 GITHUB_TOKEN 은
#       사용자 소유 Projects v2 를 조작할 수 없고, private 레포에선 이슈 노드 읽기에 repo 가
#       필요하다 — project 단독이면 "Could not resolve to a node" 로 실패한다 (2026-07-21 실측).
#       시크릿 미설정·만료 시 조용히 건너뛴다 (fail-open — 보드는 관제 보조 장치라
#       코드·라벨 흐름을 막으면 안 된다).
# 배포: 대상 레포 .github/workflows/ 에 복사하고, env 의 프로젝트·필드·옵션 id 를
#       그 레포 보드의 실측값으로 교체한다 (gh project field-list 로 확인).
# ⚠ 옵션 추가는 반드시 보드 UI 로 하라. updateProjectV2Field 로 옵션 목록을 교체하면
#   기존 옵션까지 **ID 가 전부 재발급**되어 모든 아이템의 Status 값이 초기화된다
#   (2026-07-22 실측 — 102개 아이템 값 소실, 규칙 기반 복원으로 수습).

name: board-status

on:
  issue_comment:
    types: [created]
  issues:
    types: [labeled, unlabeled]
  pull_request:
    types: [opened, ready_for_review, labeled, unlabeled]

permissions: {}          # 기본 토큰 미사용 — PROJECT_TOKEN 만 쓴다

env:
  PROJECT_ID: PVT_kwHOBKkbCc4BdVSU
  STATUS_FIELD_ID: PVTSSF_lAHOBKkbCc4BdVSUzhX3kI0
  IN_PROGRESS_ID: 5d54eb93
  IN_REVIEW_ID: 13dc0393
  HUMAN_WAIT_ID: 103dce2b

jobs:
  approve-to-in-progress:
    if: ${{ github.event_name == 'issue_comment' && !github.event.issue.pull_request && github.event.comment.author_association == 'OWNER' && startsWith(github.event.comment.body, '승인') }}
    runs-on: ubuntu-latest
    steps:
      - name: Move issue to In Progress
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ISSUE_NODE: ${{ github.event.issue.node_id }}
        run: |
          if [ -z "$GH_TOKEN" ]; then echo "PROJECT_TOKEN 미설정 — 건너뜀"; exit 0; fi
          ITEM=$(gh api graphql -f query='query($id:ID!){ node(id:$id){ ... on Issue { projectItems(first:10){ nodes { id project { id } } } } } }' -f id="$ISSUE_NODE" --jq ".data.node.projectItems.nodes[] | select(.project.id==\"$PROJECT_ID\") | .id")
          if [ -z "$ITEM" ]; then echo "보드 아이템 없음 — 건너뜀"; exit 0; fi
          gh api graphql -f query='mutation($p:ID!,$i:ID!,$f:ID!,$o:String!){ updateProjectV2ItemFieldValue(input:{projectId:$p,itemId:$i,fieldId:$f,value:{singleSelectOptionId:$o}}){ projectV2Item { id } } }' -f p="$PROJECT_ID" -f i="$ITEM" -f f="$STATUS_FIELD_ID" -f o="$IN_PROGRESS_ID"

  pr-to-in-review:
    if: ${{ github.event_name == 'pull_request' && (github.event.action == 'opened' || github.event.action == 'ready_for_review') }}
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issues to In Review
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          PR_NODE: ${{ github.event.pull_request.node_id }}
        run: |
          if [ -z "$GH_TOKEN" ]; then echo "PROJECT_TOKEN 미설정 — 건너뜀"; exit 0; fi
          for ITEM in $(gh api graphql -f query='query($id:ID!){ node(id:$id){ ... on PullRequest { closingIssuesReferences(first:10){ nodes { projectItems(first:10){ nodes { id project { id } } } } } } } }' -f id="$PR_NODE" --jq ".data.node.closingIssuesReferences.nodes[].projectItems.nodes[] | select(.project.id==\"$PROJECT_ID\") | .id"); do
            gh api graphql -f query='mutation($p:ID!,$i:ID!,$f:ID!,$o:String!){ updateProjectV2ItemFieldValue(input:{projectId:$p,itemId:$i,fieldId:$f,value:{singleSelectOptionId:$o}}){ projectV2Item { id } } }' -f p="$PROJECT_ID" -f i="$ITEM" -f f="$STATUS_FIELD_ID" -f o="$IN_REVIEW_ID"
          done

  # 사람-차례 라벨 ↔ "사람 대기" 컬럼 동기화.
  # 라벨이 붙는 순간이 "사람이 답해야 하는 순간"이라는 각 역할 규약(planner 계획 라벨,
  # 지휘자 정책 라벨, 리뷰어 머지 라벨)을 보드의 단일 진입점으로 모은다.
  human-wait-sync:
    if: ${{ (github.event_name == 'issues' || github.event_name == 'pull_request') && (github.event.action == 'labeled' || github.event.action == 'unlabeled') && (github.event.label.name == '정책 결정 대기' || github.event.label.name == '계획 승인 대기' || github.event.label.name == '머지 대기') }}
    runs-on: ubuntu-latest
    steps:
      - name: Sync 사람 대기 column
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          NODE_ID: ${{ github.event.issue.node_id || github.event.pull_request.node_id }}
          IS_PR: ${{ github.event_name == 'pull_request' }}
          ACTION: ${{ github.event.action }}
          STATE: ${{ github.event.issue.state || github.event.pull_request.state }}
          REPO: ${{ github.repository }}
          NUM: ${{ github.event.issue.number || github.event.pull_request.number }}
        run: |
          if [ -z "$GH_TOKEN" ]; then echo "PROJECT_TOKEN 미설정 — 건너뜀"; exit 0; fi
          if [ "$STATE" != "open" ]; then echo "닫힌 대상 — 내장 자동화(Done)에 맡김"; exit 0; fi
          ITEM=$(gh api graphql -f query='query($id:ID!){ node(id:$id){ ... on Issue { projectItems(first:10){ nodes { id project { id } } } } ... on PullRequest { projectItems(first:10){ nodes { id project { id } } } } } }' -f id="$NODE_ID" --jq ".data.node.projectItems.nodes[] | select(.project.id==\"$PROJECT_ID\") | .id")
          if [ -z "$ITEM" ]; then echo "보드 아이템 없음 — 건너뜀"; exit 0; fi
          if [ "$ACTION" = "labeled" ]; then
            TARGET="$HUMAN_WAIT_ID"
          else
            # 해제 복귀 전에 다른 사람-차례 라벨이 남아 있으면 유지
            REMAIN=$(gh api "repos/$REPO/issues/$NUM/labels" --jq '[.[].name] | map(select(. == "정책 결정 대기" or . == "계획 승인 대기" or . == "머지 대기")) | length')
            if [ "$REMAIN" -gt 0 ]; then echo "다른 사람-차례 라벨 잔존 — 유지"; exit 0; fi
            if [ "$IS_PR" = "true" ]; then TARGET="$IN_REVIEW_ID"; else TARGET="$IN_PROGRESS_ID"; fi
          fi
          gh api graphql -f query='mutation($p:ID!,$i:ID!,$f:ID!,$o:String!){ updateProjectV2ItemFieldValue(input:{projectId:$p,itemId:$i,fieldId:$f,value:{singleSelectOptionId:$o}}){ projectV2Item { id } } }' -f p="$PROJECT_ID" -f i="$ITEM" -f f="$STATUS_FIELD_ID" -f o="$TARGET"
