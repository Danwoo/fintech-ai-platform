name: CI

# multi-agent-service 코드가 바뀔 때만 ruff 린트를 돌린다.
# main 대상 PR 과 main push 두 경우 모두 트리거.
on:
  pull_request:
    branches: [main]
    paths:
      - "multi-agent-service/**"
  push:
    branches: [main]
    paths:
      - "multi-agent-service/**"

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      # 1) 저장소 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2) uv 설치 (Python 3.12 를 uv 가 관리 — pyproject 의 requires-python 과 일치)
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      # 3) ruff 린트 실행 (cwd=multi-agent-service, app/ 대상)
      - name: Ruff check
        working-directory: multi-agent-service
        run: uv run ruff check app/
