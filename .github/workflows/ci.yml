name: CI

# multi-agent-service 코드가 바뀔 때 ruff 린트를,
# lockstep 계약 양쪽(소비자: agents/domains + devactivity call_mcp_tool 리터럴 ↔ 공급자: *-mcp-service 라우터)이
# 바뀔 때 lockstep 검증을 돌린다.
# 전 서비스 인증 파일(app/core/security.py·auth_context.py·config.py)이나 대조 체커가 바뀔 때 auth lockstep 검증을 돌린다.
# main 대상 PR 과 main push 두 경우 모두 트리거.
on:
  pull_request:
    branches: [main]
    paths:
      - "multi-agent-service/**"
      - "*-mcp-service/app/routers/**"
      - "portfolio-mcp-service/**"
      - "devactivity-service/**"
      - "*/app/core/security.py"
      - "*/app/core/auth_context.py"
      - "*/app/core/config.py"
      - "scripts/verify_auth_lockstep.py"
  push:
    branches: [main]
    paths:
      - "multi-agent-service/**"
      - "*-mcp-service/app/routers/**"
      - "portfolio-mcp-service/**"
      - "devactivity-service/**"
      - "*/app/core/security.py"
      - "*/app/core/auth_context.py"
      - "*/app/core/config.py"
      - "scripts/verify_auth_lockstep.py"

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      # 1) 저장소 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2) uv 설치 (Python 3.12 를 uv 가 관리 — pyproject 의 requires-python 과 일치)
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      # 3) ruff 린트 실행 (cwd=multi-agent-service, app/ 대상)
      - name: Ruff check
        working-directory: multi-agent-service
        run: uv run ruff check app/

  # SUBAGENT_SPECS.mcp_tools ↔ MCP 라우터 operation_id 정적 대조 (stdlib 전용 — 의존성 설치 불필요)
  lockstep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: MCP lockstep check
        run: python3 multi-agent-service/scripts/verify_mcp_lockstep.py

  # 정적(schemas.py) ↔ 동적(deps.py) LLM 라우팅 스키마 parity (pydantic import 필요 — uv 환경)
  schema-parity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Schema parity check
        working-directory: multi-agent-service
        run: uv run python scripts/verify_schema_parity.py

  # core/security.py 인증 계약 (fail-closed·헤더 전용·서비스 토큰 typ — backend-service 강화판 정렬)
  auth-hardening:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Auth hardening check
        working-directory: multi-agent-service
        run: uv run python scripts/verify_auth_hardening.py

  # 전 서비스 core/security.py·auth_context.py == backend-service + config.py 강화 델타 정적 대조 (stdlib 전용 — 의존성 설치 불필요)
  auth-lockstep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth lockstep check
        run: python3 scripts/verify_auth_lockstep.py

  # stage 위상 정렬 계약 (병합·분리·순환 안전망·completed 시딩)
  stage-topology:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Stage topology check
        working-directory: multi-agent-service
        run: uv run python scripts/verify_stage_topology.py

  # 운영정보 redaction 계약 (구분자 무관 API 키 치환 + Writer evidence 경로 적용)
  redaction:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Redaction check
        working-directory: multi-agent-service
        run: uv run python scripts/verify_redaction.py

  # RES fail-closed 계약 (실패 sub-agent 강제 retry 실제 수행 + synthesize context 배제 — #74)
  res-failclosed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: RES fail-closed check
        working-directory: multi-agent-service
        run: uv run python scripts/verify_res_failclosed.py

  # 멀티모달 list content 정규화 계약 (LLM/메시지 .content str 가정 방어 — payload·narrative·final_answer — #30)
  content-normalization:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Content normalization check
        working-directory: multi-agent-service
        run: uv run python scripts/verify_content_normalization.py

  # portfolio 계산 계약 (통화별 집계 — 환율 없는 통화 혼합 스칼라합 금지 · nav 버킷 · 원본 타임스탬프 정렬 — #10)
  portfolio-calc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Portfolio calc check
        working-directory: portfolio-mcp-service
        run: uv run python scripts/verify_portfolio_calc.py

  # portfolio 계좌·카드 식별자 redaction 계약 (라벨+값 공백 구분자 포함 마스킹 · 오탐 없음 — #10)
  portfolio-redaction:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Portfolio redaction check
        working-directory: portfolio-mcp-service
        run: uv run python scripts/verify_redaction.py

  # portfolio-mcp 테넌트 격리 계약 (요청자 회사로 스코핑·교차 account_id fail-closed·무테넌트 401 — #35)
  portfolio-tenant-isolation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Portfolio tenant isolation check
        working-directory: portfolio-mcp-service
        run: uv run python scripts/verify_tenant_isolation.py

  # on-behalf 서비스 토큰 계약 (요청자 company_id 를 하류 MCP 로 전달·미설정 시 필드 부재 — #35)
  onbehalf-token:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: On-behalf token check
        working-directory: multi-agent-service
        run: uv run python scripts/verify_onbehalf_token.py

  # devactivity 스케줄러 라우트 권한/테넌트 게이팅 계약 (서비스토큰 거부·role 게이트·company_id 스코핑 — #71)
  scheduler-gating:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Scheduler gating check
        working-directory: devactivity-service
        run: uv run python scripts/verify_scheduler_gating.py

  # 멀티턴 히스토리 상한 + 인젝션 재주입 우회 차단 계약 (로드 캡·chokepoint envelope/무력화 — #85)
  history-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: History guard check
        working-directory: multi-agent-service
        run: uv run python scripts/verify_history_guard.py
