repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: no-commit-to-branch

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        language: system
        entry: bash -c 'cd frontend && if [ ! -d node_modules ]; then echo "SKIP eslint — frontend/node_modules 없음 (환경 미설치, 코드 문제 아님). cd frontend && npm ci 후 다시 커밋하세요."; exit 0; fi && for f in "$@"; do set -- "$@" "${f#frontend/}"; shift; done && npx eslint --fix "$@"' bash
        files: ^frontend/.*\.(js|jsx|ts|tsx)$
        exclude: ^frontend/prisma\.config\.ts$
        pass_filenames: true
        verbose: true

      - id: tsc
        name: tsc
        language: system
        entry: bash -c 'cd frontend && if [ ! -d node_modules ]; then echo "SKIP tsc — frontend/node_modules 없음 (환경 미설치, 코드 문제 아님). cd frontend && npm ci 후 다시 커밋하세요."; exit 0; fi && npx tsc --noEmit'
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false
        verbose: true

      - id: mcp-lockstep
        name: mcp lockstep (mcp_tools·call_mcp_tool ↔ operation_id)
        language: system
        entry: python3 multi-agent-service/scripts/verify_mcp_lockstep.py
        files: ^(multi-agent-service/app/agents/domains/.*\.py|[^/]+-mcp-service/app/routers/.*\.py|devactivity-service/app/.*\.py)$
        pass_filenames: false
