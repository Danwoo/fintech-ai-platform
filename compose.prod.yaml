      start_period: 30s

  fullstack-web:
    container_name: fullstack-web
    build:
      context: ./frontend
      args:
        APP_ENV: production
    image: fullstack-web:latest
    networks:
      - fullstack
      - mssql
      - victorialogs
    environment:
      VICTORIALOGS_URL: http://victorialogs:9428
      TZ: Asia/Seoul
      MULTI_AGENT_SERVICE_URL: http://fullstack-multi-agent:8000
      MARKET_DATA_MCP_SERVICE_URL: http://fullstack-market-data-mcp:8000
      DISCLOSURE_MCP_SERVICE_URL: http://fullstack-disclosure-mcp:8000
      NEWS_MCP_SERVICE_URL: http://fullstack-news-mcp:8000
      WEB_MCP_SERVICE_URL: http://fullstack-web-mcp:8000
      DOC_SEARCH_MCP_SERVICE_URL: http://fullstack-doc-search-mcp:8000
    depends_on:
      fullstack-file:
        condition: service_healthy
      fullstack-backend:
        condition: service_healthy
      fullstack-portfolio-mcp:
        condition: service_healthy
      fullstack-devactivity:
        condition: service_healthy
      fullstack-multi-agent:
        condition: service_healthy
      fullstack-market-data-mcp:
        condition: service_healthy
      fullstack-disclosure-mcp:
        condition: service_healthy
      fullstack-news-mcp:
        condition: service_healthy
      fullstack-web-mcp:
        condition: service_healthy
      fullstack-doc-search-mcp:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: always

  fullstack-nginx:
    container_name: fullstack-nginx
    build:
      context: ./platform/nginx
    image: fullstack-nginx:latest
    networks:
      - fullstack
    ports:
      - 1080:80
    depends_on:
      fullstack-web:
        condition: service_healthy
        restart: true
      fullstack-file:
        condition: service_healthy
        restart: true

networks:
  fullstack:
    name: fullstack
  sftp:
    external: true
  mssql:
    external: true
  victorialogs:
    external: true
