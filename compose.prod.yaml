services:
  fullstack-file:
    container_name: fullstack-file
    build:
      context: ./file-service
    image: fullstack-file:latest
    networks:
      - fullstack
      - sftp
      - mssql
      - victorialogs
    environment:
      APP_ENV: production
      SERVICE_LOGGING_LEVEL: WARNING
      VICTORIALOGS_URL: http://victorialogs:9428
      TZ: Asia/Seoul
    shm_size: 8gb
    command: uv run uvicorn main:app --workers=4 --host=0.0.0.0 --port=8000
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/openapi.json').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  fullstack-backend:
    container_name: fullstack-backend
    build:
      context: ./backend-service
    image: fullstack-backend:latest
    networks:
      - fullstack
      - mssql
