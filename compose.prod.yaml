    environment:
      APP_ENV: production
      SERVICE_LOGGING_LEVEL: WARNING
      VICTORIALOGS_URL: http://victorialogs:9428
      TZ: Asia/Seoul
    shm_size: 8gb
    command: uv run uvicorn main:app --workers=1 --host=0.0.0.0 --port=8000
