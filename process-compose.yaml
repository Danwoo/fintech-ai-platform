processes:
  backend:
    vars:
      PORT: 8000
    command: "fuser -k {{.PORT}}/tcp 2>/dev/null; uv run python -m uvicorn main:app --reload --host 0.0.0.0 --port {{.PORT}}"
    working_dir: "backend-service/app"
    availability:
      restart: "on_failure"

  devactivity:
    vars:
      PORT: 8001
    command: "fuser -k {{.PORT}}/tcp 2>/dev/null; uv run python -m uvicorn main:app --reload --host 0.0.0.0 --port {{.PORT}}"
