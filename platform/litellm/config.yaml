model_list:
  # LLM 모델 (Qwen3.6-27B)
  - model_name: Qwen3.6-27B
    litellm_params:
      model: openai/Qwen/Qwen3.6-27B-FP8
      api_base: http://sglang-llm:30000/v1
      api_key: os.environ/OPENAI_API_KEY
      timeout: 600
    model_info:
      supports_vision: true
      supports_function_calling: true

# =============================================================================
# 가드레일
#   - canary-inject : pre_call  — 시스템 프롬프트 앞에 canary 토큰 주입(누설 탐지의 전제). §1
#   - pii-mask      : pre_call  — 고민감 PII만 마스킹(전화·이메일·사업자·우편번호는 통과). §4/§12B
#   - safety        : post_call — canary 누설=차단, 욕설=마스킹.
#                                 비스트리밍=조립 후 처리, 스트리밍=토큰 흐름 중 검사+방출 prefix 마스킹(hold-back).
#                                 LiteLLM 이 stream 여부로 success_hook↔streaming_iterator_hook 자동 분기. §1/§3/§9
#
# 모델 범위: 각 가드레일 litellm_params 에 `models: ["A","B"]` 선언 시 해당 model_name 요청에만 적용.
#            생략하면 전체 모델.
# 더 강한 분류가 필요하면 LLM Guard / Qwen3Guard 를 별도 모델로 라우팅.
# =============================================================================
guardrails:
  - guardrail_name: "canary-inject"
    litellm_params:
      guardrail: custom_guardrail.CanaryInjectGuard
      mode: "pre_call"
      default_on: true
      models: ["Qwen3.6-27B"]

  - guardrail_name: "pii-mask"
    litellm_params:
      guardrail: custom_guardrail.PiiMaskGuard
      mode: "pre_call"
      default_on: true
      models: ["Qwen3.6-27B"]

  - guardrail_name: "safety"
    litellm_params:
      guardrail: custom_guardrail.SafetyGuard
      mode: "post_call"
      default_on: true
      models: ["Qwen3.6-27B"]

litellm_settings:
  drop_params: true
  set_verbose: false
  request_timeout: 600

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 600
